name: Detect Pricing Changes

on:
  schedule:
    # Runs daily at 06:00 UTC (11:30 AM IST)
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (detect but don't send emails)"
        required: false
        default: "false"
        type: boolean

jobs:
  detect-changes:
    name: Scan audits for stale pricing
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger detect-changes endpoint
        run: |
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          echo "Running detect-changes (dry_run=$DRY_RUN)"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "${{ secrets.APP_URL }}/api/detect-changes" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"dryRun\": $DRY_RUN}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::detect-changes endpoint returned $HTTP_CODE"
            exit 1
          fi

          # Print summary
          FLAGGED=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('flagged',0))" 2>/dev/null || echo "?")
          EMAILS=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('emailsSent',0))" 2>/dev/null || echo "?")
          echo "✓ Scanned complete: $FLAGGED audits flagged, $EMAILS emails sent"
